<style>
:root{ --navy:#0b3d6e; --navy-light:#14508d; --green:#1fa463; --bg:#f1f5f9; --card:#ffffff; --text:#0f172a; --shadow:rgba(0,0,0,.08); }
body.dark{ --bg:#0f172a; --card:#1e293b; --text:#ffffff; --shadow:rgba(0,0,0,.4); }
*{ margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; }
body{ background:var(--bg); color:var(--text); overflow-x:hidden; transition:.4s; }
body::before{ content:""; position:fixed; inset:0; background-image: radial-gradient(rgba(31,164,99,.08) 1px,transparent 1px); background-size:30px 30px; z-index:-1; }

/* LOADER */
.loader{ position:fixed; inset:0; background:linear-gradient(135deg,#ffffff,#14508d); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; color:white; transition:1s; }
.loader.hide{ opacity:0; visibility:hidden; }
.loader-logo{ width:130px; height:130px; border-radius:50%; overflow:hidden; border:5px solid #1fa463; animation:glow 1.5s infinite alternate; background:white; }
.loader-logo img{ width:100%; height:100%; object-fit:cover; }
@keyframes glow{ from{ box-shadow:0 0 10px #1fa463; transform:scale(1); } to{ box-shadow:0 0 40px #1fa463; transform:scale(1.05); } }

/* HEADER */
.header{ padding:40px 20px; text-align:center; position:relative; }
.controls{ position:absolute; top:20px; left:20px; display:flex; gap:10px; }
.controls button{ width:45px; height:45px; border:none; border-radius:12px; cursor:pointer; background:linear-gradient(135deg,var(--navy),var(--navy-light)); color:white; font-size:1rem; transition:.3s; }
.controls button:hover{ transform:translateY(-3px); }
.controls button.admin-active { background: linear-gradient(135deg, #dc2626, #991b1b); box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
.logo-box{ width:170px; height:170px; margin:auto; border-radius:50%; overflow:hidden; border:5px solid var(--green); background:white; box-shadow:0 10px 35px rgba(11,61,110,.2); }
.logo-box img{ width:100%; height:100%; object-fit:cover; }
.header h1{ margin-top:20px; font-size:2.6rem; color:var(--navy); }
body.dark .header h1{ color:white; }
.header h1 span{ color:var(--green); }
.subtitle{ margin-top:10px; color: var(--text); font-weight:600; }

/* ADMINS */
.admin-section{ max-width:1200px; margin:auto; display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
.admin-card{ width:260px; background:linear-gradient(135deg,var(--navy),var(--navy-light)); color:white; border-radius:22px; padding:25px 20px; text-align:center; transition:.4s; overflow:hidden; position:relative; }
.admin-card:hover{ transform:translateY(-8px); }
.admin-card img{ width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--green); margin-bottom:12px; background:white; }
.admin-card p{ color:#86efac; font-weight:bold; margin-top:8px; }

/* MAIN */
.container{ max-width:1250px; margin:auto; padding:30px 20px 80px; }
.section-title{ display:flex; align-items:center; gap:15px; margin-bottom:35px; }
.section-title h2{ font-size:1.5rem; }
.line{ flex:1; height:2px; background:linear-gradient(to left,var(--green),transparent); }
html[dir="ltr"] .line{ background:linear-gradient(to right,var(--green),transparent); }
.team-grid{ display:flex; flex-wrap:wrap; justify-content:center; gap:25px; }

/* CARDS */
.dept-card{ width:280px; background:var(--card); border-radius:25px; padding:35px 25px; text-align:center; cursor:pointer; transition:.4s; position:relative; overflow:hidden; box-shadow:0 10px 25px var(--shadow); }
.dept-card:hover{ transform:translateY(-10px); }
.dept-icon{ width:90px; height:90px; margin:auto auto 18px; background:rgba(31,164,99,.12); border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:2.3rem; color:var(--green); transition:.3s; }
.dept-card:hover .dept-icon{ background:var(--green); color:white; }
.members-count{ margin-top:10px; color:#64748b; }

/* SIDEBAR */
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:1000; }
.overlay.active{ display:block; }
.sidebar{ position:fixed; top:0; left:-450px; width:420px; max-width:100%; height:100%; background:var(--card); z-index:1005; padding:30px; overflow-y:auto; transition:.5s; }
html[dir="ltr"] .sidebar { left: auto; right: -450px; }
.sidebar.active{ left:0; }
html[dir="ltr"] .sidebar.active { left: auto; right: 0; }
.sidebar-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
.close-btn{ font-size:2rem; cursor:pointer; }
.leader-box{ background:linear-gradient(135deg,var(--navy),var(--navy-light)); color:white; border-radius:25px; padding:30px 20px; text-align:center; margin-bottom:30px; }
.leader-box img{ width:120px; height:120px; border-radius:50%; border:4px solid var(--green); object-fit:cover; margin-bottom:15px; background:white; }
.member-item{ display:flex; align-items:center; gap:15px; padding:14px; border-radius:18px; background:var(--bg); margin-bottom:12px; border-right:4px solid var(--green); text-align: start; position: relative; }
html[dir="ltr"] .member-item { border-right: none; border-left: 4px solid var(--green); }
.member-img{ width:58px; height:58px; border-radius:50%; object-fit:cover; }

/* ADMIN CONTROLS */
.delete-btn { position: absolute; left: 15px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: none; }
html[dir="ltr"] .delete-btn { left: auto; right: 15px; }
.admin-mode .delete-btn { display: flex; justify-content: center; align-items: center; }
.add-member-form { display: none; background: var(--bg); padding: 15px; border-radius: 18px; margin-top: 20px; border: 2px dashed var(--green); }
.admin-mode .add-member-form { display: block; }
.add-member-form input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); }

footer{ background:linear-gradient(135deg,var(--navy),#082949); color:white; text-align:center; padding:45px 20px; }

let teamData = originalTeamData; 
let current = "ar";
let activeDept = null;
let isAdminMode = false;

async function loadDataFromServer() {
    try {
        let response = await fetch('get_data.php?v=' + Date.now());
        let data = await response.json();
        
        if(data && Object.keys(data).length > 0 && data.dept1) {
            teamData = data; 
        } else {
            teamData = originalTeamData;
            saveDataToServer(originalTeamData);
        }
        renderDepartments();
    } catch(error) {
        console.error("Error loading data from SQL, loading backup.", error);
        teamData = originalTeamData;
        renderDepartments();
    }
}

// الدالة المعدلة لإرسال البيانات كـ Form POST لتخطي حماية الاستضافة
function saveDataToServer(dataToSave) {
    const params = new URLSearchParams();
    params.append('team_data', JSON.stringify(dataToSave));

    fetch('save_data.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        body: params
    })
    .then(res => res.json())
    .then(resData => {
        if(resData.status === "success") {
            console.log("تم الحفظ في قاعدة البيانات بنجاح!");
        } else {
            alert("خطأ من السيرفر أثناء الحفظ: " + resData.message);
        }
    })
    .catch(err => {
        console.error("فشل الاتصال بالسيرفر:", err);
        alert("فشل الاتصال بالسيرفر. تأكد أنك تفتح الموقع من الرابط وليس محلياً!");
    });
}

function toggleAdminMode() {
    isAdminMode = !isAdminMode;
    const btn = document.getElementById('adminToggleBtn');
    const sidebar = document.getElementById('sidebar');
    if (isAdminMode) {
        btn.classList.add('admin-active');
        sidebar.classList.add('admin-mode');
        alert(current === 'ar' ? 'تم تفعيل وضع الإدارة. يمكنك الآن إضافة وحذف الأعضاء.' : 'Admin mode enabled.');
    } else {
        btn.classList.remove('admin-active');
        sidebar.classList.remove('admin-mode');
    }
    if(activeDept) renderSidebar();
}

function addMember() {
    if(!activeDept) return;
    let nameAr = document.getElementById('newMemberNameAr').value;
    let nameEn = document.getElementById('newMemberNameEn').value;
    let roleAr = document.getElementById('newMemberRoleAr').value;
    let roleEn = document.getElementById('newMemberRoleEn').value;
    let imgInput = document.getElementById('newMemberImg').value;

    if(!nameAr || !nameEn) return alert("يرجى إدخال اسم العضو باللغتين العربي والإنجليزي لكي يعمل التبديل");

    teamData[activeDept].members.push({
        name: { ar: nameAr, en: nameEn },
        role: { ar: roleAr || 'عضو', en: roleEn || 'Member' },
        img: imgInput || 'https://via.placeholder.com/58'
    });

    document.getElementById('newMemberNameAr').value = "";
    document.getElementById('newMemberNameEn').value = "";
    document.getElementById('newMemberRoleAr').value = "";
    document.getElementById('newMemberRoleEn').value = "";
    document.getElementById('newMemberImg').value = "";

    saveDataToServer(teamData);
    renderSidebar();
    renderDepartments(); 
}

function deleteMember(index) {
    if(!confirm("هل أنت متأكد من حذف هذا العضو نهائياً؟")) return;
    teamData[activeDept].members.splice(index, 1);
    saveDataToServer(teamData);
    renderSidebar();
    renderDepartments();
}

function renderDepartments() {
    const container = document.getElementById('departments-container');
    container.innerHTML = "";
    for(let deptId in teamData) {
        let dept = teamData[deptId];
        container.innerHTML += `
        <div class="dept-card" onclick="openSidebar('${deptId}')">
            <div class="dept-icon"><i class="fas ${dept.icon}"></i></div>
            <h3>${dept.title[current]}</h3>
            <div class="members-count">${dept.members.length} ${current === 'ar' ? 'أعضاء' : 'Members'}</div>
        </div>`;
    }
    for (let key in translations[current]) {
        let el = document.getElementById(key);
        if (el && key !== "sidebar-title") el.innerHTML = translations[current][key];
    }
}

function openSidebar(deptId) {
    activeDept = deptId;
    renderSidebar();
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function renderSidebar() {
    if (!activeDept) return;
    let dept = teamData[activeDept];
    document.getElementById("sidebar-title").innerText = dept.title[current];
    document.getElementById("leader-content").innerHTML = `
        <div class="leader-box">
            <img src="${dept.leader.img}" onerror="this.src='https://via.placeholder.com/120'">
            <h3>${dept.leader.name[current]}</h3>
            <p>${dept.leader.role[current]}</p>
        </div>`;
    
    let list = document.getElementById("members-list");
    list.innerHTML = "";
    dept.members.forEach((member, index) => {
        list.innerHTML += `
        <div class="member-item">
            <button class="delete-btn" onclick="deleteMember(${index})"><i class="fas fa-trash"></i></button>
            <img src="${member.img}" class="member-img" onerror="this.src='https://via.placeholder.com/58'">
            <div><h4>${member.name[current]}</h4><p>${member.role[current]}</p></div>
        </div>`;
    });
}

function closeSidebar() {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
    setTimeout(() => { activeDept = null; }, 400);
}

function toggleDarkMode() { document.body.classList.toggle("dark"); }

function toggleLanguage() {
    current = current === "ar" ? "en" : "ar";
    document.documentElement.lang = current;
    document.documentElement.dir = current === "en" ? "ltr" : "rtl";
    renderDepartments();
    if(activeDept) renderSidebar();
}

window.addEventListener('DOMContentLoaded', () => {
    loadDataFromServer();
});
</script>
